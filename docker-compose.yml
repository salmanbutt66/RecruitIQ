services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recruitiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruitiq}
      POSTGRES_DB: ${POSTGRES_DB:-recruitiq}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recruitiq}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-recruitiq-resumes};
      exit 0;
      "

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-recruitiq}:${POSTGRES_PASSWORD:-recruitiq}@postgres:5432/${POSTGRES_DB:-recruitiq}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      LITELLM_BASE_URL: http://litellm:4000
      CREWAI_STORAGE_DIR: /app/.crewai_storage
    volumes:
      - ./backend:/app
      - crewai_storage:/app/.crewai_storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      litellm:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      python scripts/seed_platform_admin.py &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      target: development
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-recruitiq}:${POSTGRES_PASSWORD:-recruitiq}@postgres:5432/${POSTGRES_DB:-recruitiq}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      LITELLM_BASE_URL: http://litellm:4000
      CREWAI_STORAGE_DIR: /app/.crewai_storage
    volumes:
      - ./backend:/app
      - crewai_storage:/app/.crewai_storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      litellm:
        condition: service_healthy
    command: arq app.workers.settings.WorkerSettings

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

  admin:
    build:
      context: ./admin
      target: development
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./admin:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
  crewai_storage:
